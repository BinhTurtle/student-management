<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Chỉnh Sửa Sinh Viên</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 40px;
        background-color: #f8f9fa;
        color: #333;
        display: flex;
        justify-content: center;
      }

      .card {
        background: white;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 500px;
      }

      .card h1 {
        color: #2c3e50;
        margin-top: 0;
        margin-bottom: 25px;
        border-bottom: 2px solid #f1f3f5;
        padding-bottom: 10px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
      }

      .form-control {
        width: 100%;
        padding: 10px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.3s;
      }

      .form-control:focus {
        border-color: #f39c12;
      }

      /* --- Nút bấm --- */
      .actions {
        margin-top: 30px;
        display: flex;
        gap: 10px;
      }

      .btn {
        padding: 12px 20px;
        color: white;
        text-decoration: none;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;
        flex: 1;
        text-align: center;
        transition: background-color 0.3s;
      }

      .btn-cancel {
        background-color: #95a5a6;
      }
      .btn-cancel:hover { background-color: #7f8c8d; }

      .btn-save {
        background-color: #2ecc71;
      }
      .btn-save:hover { background-color: #27ae60; }
      
      .readonly-input {
        background-color: #eee;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    
    <div class="card">
      <h1>Chỉnh Sửa Thông Tin</h1>
      
      <form th:action="@{/students/edit/{id}(id=${studentId})}" th:object="${studentDto}" method="POST">
        
        <div class="form-group">
          <label>ID (Không thể sửa):</label>
          <input type="text" class="form-control readonly-input" th:value="${studentId}" readonly />
        </div>

        <div class="form-group">
          <label for="name">Họ và Tên:</label>
          <input type="text" id="name" class="form-control" th:field="*{name}" required />
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" class="form-control" th:field="*{email}" required />
        </div>

        <div class="form-group">
          <label for="age">Tuổi:</label>
          <input type="number" id="age" class="form-control" th:field="*{age}" required />
        </div>

        <div class="actions">
          <a th:href="@{/students/{id}(id=${studentId})}" class="btn btn-cancel">Hủy Bỏ</a>
          <button type="submit" class="btn btn-save">Lưu Thay Đổi</button>
        </div>
        
      </form>
    </div>

  </body>
</html>

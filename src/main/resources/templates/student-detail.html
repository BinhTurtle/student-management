<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Chi Tiết Sinh Viên</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        padding: 40px;
        background-color: #f8f9fa;
        display: flex;
        justify-content: center;
        color: #333;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 500px;
      }
      .info-group {
        margin-bottom: 15px;
        font-size: 16px;
      }
      .info-group strong {
        display: inline-block;
        width: 120px;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 25px;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }
      .btn {
        padding: 10px 20px;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        flex: 1;
      }
      .btn-gray {
        background-color: #95a5a6;
      }
      .btn-orange {
        background-color: #f39c12;
      }
      .btn-red {
        background-color: #e74c3c;
      }
      .btn-blue {
        background-color: #3498db;
      }

      /* --- CSS CHO MODAL --- */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(3px);
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 450px;
        animation: slideDown 0.3s ease-out;
      }
      @keyframes slideDown {
        from {
          transform: translateY(-20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .form-control {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .readonly {
        background-color: #eee;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 style="margin-top: 0">Thông Tin Chi Tiết</h2>
      <div class="info-group">
        <strong>ID:</strong> <span th:text="${student.id}"></span>
      </div>
      <div class="info-group">
        <strong>Họ và Tên:</strong> <span th:text="${student.name}"></span>
      </div>
      <div class="info-group">
        <strong>Email:</strong> <span th:text="${student.email}"></span>
      </div>
      <div class="info-group">
        <strong>Tuổi:</strong> <span th:text="${student.age}"></span>
      </div>

      <div class="actions">
        <a th:href="@{/students}" class="btn btn-gray">Quay lại</a>
        <button
          type="button"
          class="btn btn-orange"
          onclick="openModal('editModal')"
        >
          Chỉnh Sửa
        </button>
        <button
          type="button"
          class="btn btn-red"
          onclick="openModal('deleteModal')"
        >
          Xóa
        </button>
      </div>
    </div>

    <div id="editModal" class="modal-overlay">
      <div class="modal-card">
        <h2 style="margin-top: 0">Chỉnh Sửa Thông Tin</h2>
        <form
          th:action="@{/students/edit/{id}(id=${student.id})}"
          th:object="${studentDto}"
          th:method="PUT"
        >
          <div class="form-group">
            <label>ID:</label>
            <input
              type="text"
              class="form-control readonly"
              th:value="${student.id}"
              readonly
            />
          </div>
          <div class="form-group">
            <label>Họ và Tên:</label>
            <input
              type="text"
              class="form-control"
              th:field="*{name}"
              required
            />
          </div>
          <div class="form-group">
            <label>Email:</label>
            <input
              type="email"
              class="form-control"
              th:field="*{email}"
              required
            />
          </div>
          <div class="form-group">
            <label>Tuổi:</label>
            <input
              type="number"
              class="form-control"
              th:field="*{age}"
              required
            />
          </div>
          <div class="actions" style="margin-top: 15px">
            <button
              type="button"
              class="btn btn-gray"
              onclick="closeModal('editModal')"
            >
              Hủy
            </button>
            <button type="submit" class="btn btn-orange">Cập Nhật</button>
          </div>
        </form>
      </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
      <div class="modal-card" style="max-width: 400px; text-align: center">
        <h2 style="color: #e74c3c; margin-top: 0">Cảnh báo!</h2>
        <p>
          Bạn có chắc chắn muốn xóa dữ liệu của sinh viên
          <strong><span th:text="${student.name}"></span></strong> không? Hành
          động này không thể hoàn tác.
        </p>

        <form
          th:action="@{/students/delete/{id}(id=${student.id})}"
          th:method="DELETE"
          style="display: flex; gap: 10px; margin-top: 25px"
        >
          <button
            type="button"
            class="btn btn-gray"
            onclick="closeModal('deleteModal')"
          >
            Hủy bỏ
          </button>
          <button type="submit" class="btn btn-red">Vâng, Xóa ngay!</button>
        </form>
      </div>
    </div>

    <script>
      function openModal(modalId) {
        document.getElementById(modalId).classList.add("active");
      }
      function closeModal(modalId) {
        document.getElementById(modalId).classList.remove("active");
      }
    </script>
  </body>
</html>

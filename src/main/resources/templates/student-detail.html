<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Chi Tiết Sinh Viên</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 40px;
        background-color: #f8f9fa;
        color: #333;
        display: flex;
        justify-content: center; /* Căn giữa card màn hình */
      }

      /* --- Khu vực Card thông tin --- */
      .card {
        background: white;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 500px;
      }

      .card h1 {
        color: #2c3e50;
        margin-top: 0;
        margin-bottom: 25px;
        border-bottom: 2px solid #f1f3f5;
        padding-bottom: 10px;
      }

      .info-group {
        margin-bottom: 15px;
        font-size: 16px;
      }

      .info-group strong {
        display: inline-block;
        width: 120px;
        color: #555;
      }

      /* --- Khu vực Nút bấm --- */
      .actions {
        margin-top: 30px;
        display: flex;
        gap: 10px;
        border-top: 1px solid #f1f3f5;
        padding-top: 20px;
      }

      .btn {
        padding: 10px 20px;
        color: white;
        text-decoration: none;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;
        transition: background-color 0.3s;
        text-align: center;
      }

      .btn-back {
        background-color: #95a5a6;
      }
      .btn-back:hover { background-color: #7f8c8d; }

      .btn-edit {
        background-color: #f39c12; /* Màu cam */
        flex: 1; /* Chiếm nhiều không gian hơn */
      }
      .btn-edit:hover { background-color: #d35400; }

      .btn-delete {
        background-color: #e74c3c; /* Màu đỏ */
        flex: 1;
      }
      .btn-delete:hover { background-color: #c0392b; }

      /* Form xóa cần display inline để hiển thị cùng hàng với các nút khác */
      .delete-form {
        display: inline-flex;
        flex: 1;
      }
      .delete-form .btn {
        width: 100%;
      }
    </style>
  </head>
  <body>
    
    <div class="card">
      <h1>Thông Tin Sinh Viên</h1>
      
      <div class="info-group">
        <strong>ID:</strong> 
        <span th:text="${student.id}">ID Mẫu</span>
      </div>
      <div class="info-group">
        <strong>Họ và Tên:</strong> 
        <span th:text="${student.name}">Tên Mẫu</span>
      </div>
      <div class="info-group">
        <strong>Email:</strong> 
        <span th:text="${student.email}">Email Mẫu</span>
      </div>
      <div class="info-group">
        <strong>Tuổi:</strong> 
        <span th:text="${student.age}">0</span>
      </div>

      <div class="actions">
        <a th:href="@{/students}" class="btn btn-back">Quay lại</a>
        
        <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-edit">Chỉnh Sửa</a>
        
        <form th:action="@{/students/delete/{id}(id=${student.id})}" method="POST" class="delete-form" onsubmit="return confirm('Bạn có chắc chắn muốn xóa sinh viên này vĩnh viễn không?');">
          <button type="submit" class="btn btn-delete">Xóa</button>
        </form>
      </div>
    </div>

  </body>
</html>

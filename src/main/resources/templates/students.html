<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh Sách Sinh Viên</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 40px;
        background-color: #f8f9fa;
        color: #333;
      }

      h1 {
        color: #2c3e50;
        margin-bottom: 30px;
      }

      /* --- Khu vực Thanh Tìm Kiếm --- */
      .search-container {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        max-width: 500px;
      }

      .search-input {
        flex: 1;
        padding: 10px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }

      .search-input:focus {
        border-color: #3498db; /* Đổi màu khi click vào */
        box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
      }

      .btn-search {
        padding: 10px 25px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.3s;
      }

      .btn-search:hover {
        background-color: #2980b9; /* Đậm hơn khi di chuột qua */
      }

      /* --- Khu vực Bảng --- */
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      th,
      td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #eee;
      }

      th {
        background-color: #f1f3f5;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 0.5px;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .text-danger {
        color: #e74c3c !important;
        background-color: #fff5f5;
        font-weight: bold;
      }

      /* --- Nút Chi tiết --- */
      .btn-detail {
        display: inline-block;
        padding: 6px 15px;
        background-color: #2ecc71; /* Màu xanh lá */
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        transition: background-color 0.3s;
      }

      .btn-detail:hover {
        background-color: #27ae60;
      }
    </style>
  </head>
  <body>
    <h1>Danh Sách Sinh Viên</h1>

    <form action="/students" method="GET" class="search-container">
      <input
        type="text"
        name="keyword"
        class="search-input"
        placeholder="Nhập tên sinh viên cần tìm..."
        th:value="${param.keyword}"
      />
      <button type="submit" class="btn-search">Tìm kiếm</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Họ và Tên</th>
          <th>Email</th>
          <th>Tuổi</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr
          th:each="student : ${dsSinhVien}"
          th:class="${student.age <= 18 || student.age > 22} ? 'text-danger' : ''"
        >
          <td th:text="${student.id}">ID Mẫu</td>
          <td th:text="${student.name}">Tên Mẫu</td>
          <td th:text="${student.email}">Email Mẫu</td>
          <td th:text="${student.age}">0</td>
          <td>
            <a th:href="@{/students/{id}(id=${student.id})}" class="btn-detail">Chi tiết</a>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
